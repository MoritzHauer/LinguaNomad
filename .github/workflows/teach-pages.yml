name: Deploy _teach to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - _teach/**
      - .github/workflows/teach-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload _teach as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _teach

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5